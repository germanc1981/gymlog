<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#09090b">
<title>GymLog</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:22px}
html,body{height:100%;background:#09090b;color:#fafafa;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;font-weight:600;transition:opacity .1s}
button:active{opacity:.7}
input,select,textarea{font-family:inherit;font-size:1rem;outline:none;color:#fafafa;
  background:#1c1c21;border:1.5px solid #27272a;border-radius:10px;padding:12px 14px;
  width:100%;box-sizing:border-box}
input[type=date]{color-scheme:dark}
input:focus,select:focus,textarea:focus{border-color:#0ea5e9}
select option{background:#1c1c21}
textarea{resize:none}
.hscroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.hscroll::-webkit-scrollbar{display:none}
.card{background:#111113;border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid #1c1c21;transition:border-color .2s}
.pill{display:inline-block;font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:8px;letter-spacing:.3px}
.overlay{position:fixed;inset:0;background:#000a;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#111113;border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #1c1c21;position:sticky;top:0;background:#111113;z-index:1}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0a0a0d;border-top:1px solid #1c1c21;display:flex;z-index:50}
.nb{flex:1;padding:12px 0;font-size:.65rem;font-weight:600;background:transparent;color:#3f3f46;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:0;border:none}
.nb.on{color:#0ea5e9}
.flbl{font-size:.65rem;color:#71717a;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const MUSCLES=['Glúteos','Piernas','Pecho','Espalda','Hombros','Bíceps','Tríceps','Core','Lumbares'];
const MC={Glúteos:'#f97316',Piernas:'#3b82f6',Hombros:'#06b6d4',Pecho:'#ec4899',
  Espalda:'#8b5cf6',Bíceps:'#0ea5e9',Tríceps:'#f59e0b',Core:'#22c55e',Lumbares:'#94a3b8'};
const ACC=['#f97316','#3b82f6','#10b981','#ec4899','#8b5cf6','#f43f5e'];
const SKY='#0ea5e9';
const GREEN='#10b981';
const ORANGE='#f59e0b';

// ─── PRESETS (solo nombre + músculo) ─────────────────────────────────────────
const PRESETS=[
  {id:'pg1',name:'Puente de glúteos unipodal',muscle:'Glúteos'},
  {id:'pg2',name:'Hip thrust c/barra',muscle:'Glúteos'},
  {id:'pg3',name:'Hip thrust c/bandas',muscle:'Glúteos'},
  {id:'pg4',name:'Patada de glúteos a máquina',muscle:'Glúteos'},
  {id:'pg5',name:'Kickbacks c/bandas',muscle:'Glúteos'},
  {id:'pg6',name:'Abducción de caderas a máquina',muscle:'Glúteos'},
  {id:'pg7',name:'Extensión de cadera',muscle:'Glúteos'},
  {id:'pi1',name:'Sentadilla c/barra',muscle:'Piernas'},
  {id:'pi2',name:'Sentadilla búlgara c/peso',muscle:'Piernas'},
  {id:'pi3',name:'Sentadilla sumo',muscle:'Piernas'},
  {id:'pi4',name:'Prensa isológica',muscle:'Piernas'},
  {id:'pi5',name:'Máquina Hack',muscle:'Piernas'},
  {id:'pi6',name:'Leg curl',muscle:'Piernas'},
  {id:'pi7',name:'Leg extension',muscle:'Piernas'},
  {id:'pi8',name:'Gemelos en Smith',muscle:'Piernas'},
  {id:'pi9',name:'Subidas al banco 1 pie',muscle:'Piernas'},
  {id:'pi10',name:'Estocadas laterales c/peso',muscle:'Piernas'},
  {id:'pi11',name:'Isométrica c/peso',muscle:'Piernas'},
  {id:'pe1',name:'Press plano c/barra',muscle:'Pecho'},
  {id:'pe2',name:'Press plano c/mancuernas',muscle:'Pecho'},
  {id:'pe3',name:'Press inclinado c/barra',muscle:'Pecho'},
  {id:'pe4',name:'Press inclinado c/mancuernas',muscle:'Pecho'},
  {id:'pe5',name:'Apertura a máquina',muscle:'Pecho'},
  {id:'pe6',name:'Pecho a máquina',muscle:'Pecho'},
  {id:'pe7',name:'Cruce de grandes c/banco',muscle:'Pecho'},
  {id:'es1',name:'Peso muerto',muscle:'Espalda'},
  {id:'es2',name:'Peso muerto rumano',muscle:'Espalda'},
  {id:'es3',name:'Remo c/barra',muscle:'Espalda'},
  {id:'es4',name:'Jalón al pecho (dorsales)',muscle:'Espalda'},
  {id:'es5',name:'Remo a dorsales',muscle:'Espalda'},
  {id:'es6',name:'Remo en polea',muscle:'Espalda'},
  {id:'es7',name:'Serratos c/mancuernas',muscle:'Espalda'},
  {id:'ho1',name:'Vuelo lateral c/mancuernas',muscle:'Hombros'},
  {id:'ho2',name:'Vuelo frontal c/mancuernas',muscle:'Hombros'},
  {id:'ho3',name:'Press militar c/barra',muscle:'Hombros'},
  {id:'ho4',name:'Press militar c/mancuernas',muscle:'Hombros'},
  {id:'ho5',name:'Vuelo posterior c/mancuernas',muscle:'Hombros'},
  {id:'ho6',name:'Posteriores a máquina',muscle:'Hombros'},
  {id:'bi1',name:'Curl martillo c/mancuernas',muscle:'Bíceps'},
  {id:'bi2',name:'Curl c/barra',muscle:'Bíceps'},
  {id:'bi3',name:'Curl c/polea',muscle:'Bíceps'},
  {id:'bi4',name:'Bíceps en banco Scott',muscle:'Bíceps'},
  {id:'bi5',name:'Curl alterno c/mancuernas',muscle:'Bíceps'},
  {id:'tr1',name:'Tríceps a polea (cuerda)',muscle:'Tríceps'},
  {id:'tr2',name:'Tríceps en polea c/barra',muscle:'Tríceps'},
  {id:'tr3',name:'Tríceps francés c/halter',muscle:'Tríceps'},
  {id:'tr4',name:'Press cerrado c/barra',muscle:'Tríceps'},
  {id:'tr5',name:'Fondos en banco',muscle:'Tríceps'},
  {id:'co1',name:'Abdominales c/fitball',muscle:'Core'},
  {id:'co2',name:'Abdominales twist',muscle:'Core'},
  {id:'co3',name:'Abdominales c/medicine ball',muscle:'Core'},
  {id:'co4',name:'Plancha',muscle:'Core'},
  {id:'co5',name:'Crunch en máquina',muscle:'Core'},
  {id:'lu1',name:'Lumbares alternados',muscle:'Lumbares'},
  {id:'lu2',name:'Hiperextensión en banco',muscle:'Lumbares'},
];

const DEFAULT_ROUTINE={days:[
  {id:1,label:'DÍA 1',exercises:[
    {id:'pg1',s:4,r:'8'},{id:'pi4',s:4,r:'10'},{id:'pg7',s:4,r:'8'},
    {id:'ho1',s:4,r:'6'},{id:'pe7',s:4,r:'6-8'},{id:'ho2',s:4,r:'8'},{id:'lu1',s:4,r:'10'}
  ]},
  {id:2,label:'DÍA 2',exercises:[
    {id:'pi10',s:4,r:'10'},{id:'pi9',s:4,r:'10'},{id:'es3',s:4,r:'6'},
    {id:'es7',s:4,r:'8'},{id:'bi1',s:4,r:'8'},{id:'bi3',s:4,r:'8'},
    {id:'co1',s:4,r:'12'},{id:'co2',s:4,r:'12'}
  ]},
  {id:3,label:'DÍA 3',exercises:[
    {id:'pg5',s:4,r:'8'},{id:'pg7',s:4,r:'8'},{id:'pg6',s:4,r:'10'},
    {id:'pe1',s:4,r:'6'},{id:'pe4',s:4,r:'6'},{id:'tr1',s:4,r:'8'}
  ]},
  {id:4,label:'DÍA 4',exercises:[
    {id:'pi2',s:4,r:'10-12'},{id:'pi11',s:4,r:'15s'},{id:'pi5',s:4,r:'10'},
    {id:'pe6',s:3,r:'8'},{id:'pe5',s:3,r:'8'},{id:'tr3',s:3,r:'8'},{id:'co2',s:3,r:'10'}
  ]},
  {id:5,label:'DÍA 5',exercises:[
    {id:'pg4',s:4,r:'10'},{id:'es1',s:4,r:'8'},{id:'pi8',s:4,r:'10'},
    {id:'es5',s:3,r:'10'},{id:'es4',s:3,r:'10'},{id:'bi4',s:3,r:'10'}
  ]},
  {id:6,label:'DÍA 6',exercises:[
    {id:'pi1',s:4,r:'10'},{id:'pi5',s:4,r:'10'},{id:'ho2',s:3,r:'10'},
    {id:'ho6',s:3,r:'10'},{id:'tr2',s:3,r:'8'},{id:'co3',s:3,r:'10'},{id:'lu1',s:3,r:'10'}
  ]},
],startDate:null};

// ─── ESTADO ───────────────────────────────────────────────────────────────────
var S={
  view:'workout',dayId:1,
  exercises:[],routine:{},weights:{},
  // completions: {"YYYY-MM-DD": {dayId, checks:[exId,...], closed:bool, closedAt:ts}}
  completions:{},
  editingW:null,editingSD:null,histOpen:null,dayEditMode:false,
  libSearch:'',libFilter:'all',
  modal:null,editExData:null,
  pickerSearch:'',pickerFilter:'all',
  newExName:'',newExMuscle:'Piernas',
  progExId:null,trailTab:'resumen',importMsg:'',
};
var chartInst=null;

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function loadState(){
  try{
    var w=localStorage.getItem('gym_wt4');
    var r=localStorage.getItem('gym_rt4');
    var c=localStorage.getItem('gym_cx4');
    var cp=localStorage.getItem('gym_cp4');
    if(w) S.weights=JSON.parse(w);
    if(r){
      S.routine=JSON.parse(r);
      S.routine.days.forEach(function(d){
        if(d.exerciseIds&&!d.exercises){
          d.exercises=d.exerciseIds.map(function(id){return{id:id,s:4,r:'10'};});
          delete d.exerciseIds;
        }
        if(!d.exercises) d.exercises=[];
      });
      if(!S.routine.hasOwnProperty('startDate')) S.routine.startDate=null;
    } else {
      S.routine=JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
    }
    if(cp) S.completions=JSON.parse(cp);
    var custom=c?JSON.parse(c):[];
    S.exercises=PRESETS.concat(custom);
  }catch(e){
    S.routine=JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
    S.exercises=PRESETS.slice();
  }
}
function saveW(){try{localStorage.setItem('gym_wt4',JSON.stringify(S.weights));}catch(e){}}
function saveR(){try{localStorage.setItem('gym_rt4',JSON.stringify(S.routine));}catch(e){}}
function saveCx(){try{localStorage.setItem('gym_cx4',JSON.stringify(S.exercises.filter(function(e){return e.custom;})));}catch(e){}}
function saveCp(){try{localStorage.setItem('gym_cp4',JSON.stringify(S.completions));}catch(e){}}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9);}
function isToday(ts){return new Date(ts).toDateString()===new Date().toDateString();}
function fmtD(ts){return new Date(ts).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});}
function fmtF(ts){return new Date(ts).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function numP(v){return parseFloat(String(v).replace(',','.'));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mc(m){return MC[m]||'#888';}
function dayAcc(id){return ACC[(id-1)%6];}

// Clave de fecha local "YYYY-MM-DD"
function todayKey(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// Completión de hoy (o vacía)
function todayComp(){
  return S.completions[todayKey()]||{dayId:S.dayId,checks:[],closed:false,closedAt:null};
}
// Último estado de cierre para un dayId específico (para indicadores en tabs)
function lastCompForDay(dayId){
  var keys=Object.keys(S.completions).sort().reverse();
  for(var i=0;i<keys.length;i++){
    if(S.completions[keys[i]].dayId===dayId&&S.completions[keys[i]].closed){
      return S.completions[keys[i]];
    }
  }
  return null;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=buildAll();
  bind();
  if(S.editingW){
    var wi=document.getElementById('wi');
    if(wi){
      var cw=S.weights[S.editingW]?S.weights[S.editingW].current:'';
      if(cw) wi.value=cw;
      wi.focus();
    }
  }
  if(S.editingSD){
    var si=document.getElementById('sd-s');
    if(si) si.focus();
  }
  if(S.view==='progress'&&S.progExId) renderChart();
}

function buildAll(){
  return buildHeader()+
    (S.view==='workout'?buildWorkout():S.view==='library'?buildLibrary():buildProgress())+
    buildNav()+(S.modal?buildModal():'');
}

// ─── HEADER ──────────────────────────────────────────────────────────────────
function buildHeader(){
  var labels={workout:'Tu rutina',library:'Ejercicios',progress:'Evolución de pesos'};
  return'<div style="padding:16px 14px 4px;display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-size:20px;font-weight:800;letter-spacing:-.8px">GymLog 💪</div>'+
    '<div style="font-size:10px;color:#3f3f46">'+labels[S.view]+'</div></div></div>';
}

// ─── WORKOUT VIEW ─────────────────────────────────────────────────────────────
function buildWorkout(){
  var day=S.routine.days.find(function(d){return d.id===S.dayId;})||S.routine.days[0];
  var a=dayAcc(day.id);
  var dayAsgs=day.exercises||[];
  var dayExs=dayAsgs.map(function(asgn){
    var def=S.exercises.find(function(e){return e.id===asgn.id;});
    return def?{asgn:asgn,def:def}:null;
  }).filter(Boolean);
  var logged=dayExs.filter(function(x){return S.weights[x.asgn.id];}).length;
  var pct=dayExs.length?Math.round(logged/dayExs.length*100):0;
  var muscles=[].concat.apply([],[...new Set(dayExs.map(function(x){return x.def.muscle;}))]);

  // Completión de hoy para este día
  var tc=todayComp();
  var todayIsSameDay=tc.dayId===S.dayId;
  var checkedCount=todayIsSameDay?tc.checks.length:0;
  var totalCount=dayExs.length;

  var h='';

  // ── Fecha de inicio + antigüedad ──
  if(S.routine.startDate){
    var diffMs=Date.now()-S.routine.startDate;
    var diffDays=Math.floor(diffMs/(24*60*60*1000));
    var diffWeeks=Math.floor(diffDays/7);
    var ageStr=diffWeeks>0?'Semana '+diffWeeks+' · '+diffDays+' días':'Día '+diffDays+' de rutina';
    h+='<button data-a="openStartDate" style="display:flex;align-items:center;gap:6px;'+
      'margin:0 14px 2px;background:#18181b;border-radius:8px;padding:6px 10px;'+
      'border:1px solid #27272a;width:calc(100% - 28px);text-align:left">'+
      '<span style="font-size:13px">📅</span>'+
      '<div>'+
      '<div style="font-size:11px;font-weight:700;color:#fafafa">'+ageStr+'</div>'+
      '<div style="font-size:9px;color:#52525b">Inicio: '+fmtD(S.routine.startDate)+' · Tap para editar</div>'+
      '</div></button>';
  } else {
    h+='<button data-a="openStartDate" style="display:flex;align-items:center;gap:6px;'+
      'margin:0 14px 2px;background:transparent;border-radius:8px;padding:5px 10px;'+
      'border:1px dashed #27272a;width:calc(100% - 28px);text-align:left">'+
      '<span style="font-size:13px">📅</span>'+
      '<div style="font-size:11px;color:#52525b">Configurar fecha de inicio de la rutina</div>'+
      '</button>';
  }

  // ── Tabs de días ──
  h+='<div class="hscroll" style="padding:8px 14px 0">';
  S.routine.days.forEach(function(d){
    var da=dayAcc(d.id);
    var on=d.id===S.dayId;
    var lastC=lastCompForDay(d.id);
    // Indicador del último cierre de este día
    var dot='';
    if(lastC){
      var dayDef=S.routine.days.find(function(dd){return dd.id===d.id;});
      var totalD=dayDef?(dayDef.exercises||[]).length:0;
      var isComplete=totalD>0&&lastC.checks&&lastC.checks.length>=totalD;
      dot='<div style="width:6px;height:6px;border-radius:50%;background:'+(isComplete?GREEN:ORANGE)+
        ';margin:2px auto 0"></div>';
    }
    h+='<button data-a="day" data-v="'+d.id+'" style="flex-shrink:0;padding:6px 14px 4px;font-size:12px;border-radius:20px;'+
      'background:'+(on?da:'#18181b')+';color:'+(on?'#fff':'#52525b')+';text-align:center">'+
      d.label+dot+'</button>';
  });
  h+='</div>';

  // ── Chips de músculo + botón editar ──
  h+='<div style="padding:8px 14px 4px;display:flex;justify-content:space-between;align-items:center">';
  h+='<div class="hscroll" style="flex:1;gap:4px">';
  muscles.forEach(function(m){
    h+='<span class="pill" style="flex-shrink:0;background:'+mc(m)+'18;color:'+mc(m)+';border:1px solid '+mc(m)+'28">'+m+'</span>';
  });
  h+='</div>';
  h+='<button data-a="toggleEdit" style="flex-shrink:0;margin-left:8px;padding:4px 10px;font-size:11px;border-radius:8px;'+
    'background:'+(S.dayEditMode?a+'22':'#18181b')+';color:'+(S.dayEditMode?a:'#52525b')+';border:1px solid '+(S.dayEditMode?a+'60':'#27272a')+'">'+
    (S.dayEditMode?'✓ Listo':'✏ Editar')+'</button>';
  h+='</div>';

  // ── Barra de progreso de peso ──
  h+='<div style="padding:2px 14px 8px">';
  h+='<div style="height:3px;background:#18181b;border-radius:2px;overflow:hidden">'+
    '<div style="height:100%;width:'+pct+'%;background:'+a+';border-radius:2px;transition:width .4s"></div></div>';
  h+='<div style="font-size:10px;color:#3f3f46;margin-top:3px">'+logged+'/'+totalCount+' con peso registrado</div>';
  h+='</div>';

  // ── Lista de ejercicios ──
  h+='<div style="padding:0 12px">';
  dayExs.forEach(function(x){h+=buildExCard(x.asgn,x.def,a,tc,todayIsSameDay);});
  if(S.dayEditMode){
    h+='<button data-a="openPicker" style="width:100%;background:#18181b;color:'+a+';'+
      'border:1.5px dashed '+a+'44;border-radius:12px;padding:12px;font-size:13px;margin-bottom:8px">'+
      '+ Agregar ejercicio al día</button>';
  }
  h+='</div>';

  // ── Sección cierre de día ──
  h+=buildCloseDaySection(tc,todayIsSameDay,checkedCount,totalCount,a);

  return h;
}

// ─── CARD DE EJERCICIO ────────────────────────────────────────────────────────
function buildExCard(asgn,def,a,tc,todayIsSameDay){
  var w=S.weights[asgn.id];
  var isEditW=S.editingW===asgn.id;
  var isEditSD=S.editingSD===asgn.id;
  var isHist=S.histOpen===asgn.id;
  var last=w&&w.hist&&w.hist.length?w.hist[w.hist.length-1]:null;
  var today=last&&isToday(last.d);
  var clr=mc(def.muscle);

  // Estado del check de hoy
  var isChecked=todayIsSameDay&&tc.checks&&tc.checks.indexOf(asgn.id)>=0;

  var h='<div class="card"'+(isEditW?' style="border-color:'+a+'88"':'')+'>';
  h+='<div style="padding:12px 13px">';

  // Quitar ejercicio (modo edición)
  if(S.dayEditMode){
    h+='<div style="display:flex;justify-content:flex-end;margin-bottom:6px">'+
      '<button data-a="removeEx" data-v="'+asgn.id+'" style="background:#27272a;color:#e24a4a;padding:2px 10px;font-size:11px;border-radius:7px">— Quitar</button>'+
      '</div>';
  }

  // Fila superior: check · nombre · series badge
  h+='<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:10px">';

  // Botón check (izquierda)
  h+='<button data-a="toggleCheck" data-v="'+asgn.id+'" '+
    'style="width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;'+
    'background:'+(isChecked?GREEN:'transparent')+';'+
    'border:2px solid '+(isChecked?GREEN:'#3f3f46')+';'+
    'color:'+(isChecked?'#fff':'#3f3f46')+';'+
    'font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1">'+
    (isChecked?'✓':'○')+'</button>';

  // Nombre + músculo
  h+='<div style="flex:1;min-width:0">'+
    '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:'+(today?'#10b981':clr)+';margin-bottom:2px">'+
    (today?'● ':'')+def.muscle+'</div>'+
    '<div style="font-size:14px;font-weight:600;color:#e4e4e7;line-height:1.3">'+esc(def.name)+'</div>'+
    '</div>';

  // Badge series/reps (tappable)
  if(isEditSD){

      (isHist?'▲ Ocultar':'▼ Historial ('+w.hist.length+')')+'</button>';

// ─── SECCIÓN CIERRE DE DÍA ────────────────────────────────────────────────────
function buildCloseDaySection(tc,todayIsSameDay,checkedCount,totalCount,a){
  var h='<div style="margin:4px 12px 16px">';
  if(tc.closed&&todayIsSameDay){
    // Ya está cerrado
    var isComplete=totalCount>0&&checkedCount>=totalCount;
    var icon=isComplete?'✅':'🟡';
    var label=isComplete?'Día completo':'Día incompleto';
    h+='<div style="background:#111113;border-radius:12px;padding:12px 14px;border:1px solid '+(isComplete?GREEN+'44':ORANGE+'44')+';'+
      'display:flex;justify-content:space-between;align-items:center">'+
      '<div>'+
      '<div style="font-size:13px;font-weight:700;color:'+(isComplete?GREEN:ORANGE)+'">'+icon+' '+label+'</div>'+
      '<div style="font-size:10px;color:#52525b;margin-top:2px">'+checkedCount+'/'+totalCount+' ejercicios · '+fmtD(tc.closedAt||Date.now())+'</div>'+
      '</div>'+
      '<button data-a="reopenDay" style="background:#27272a;color:#71717a;border-radius:8px;padding:4px 10px;font-size:11px">Reabrir</button>'+
      '</div>';
  } else {
    // Aún abierto
    var pctCheck=totalCount>0?Math.round(checkedCount/totalCount*100):0;
    h+='<div style="background:#111113;border-radius:12px;padding:12px 14px;border:1px solid #1c1c21">';
    // Barra de checks
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<div style="font-size:11px;color:#52525b">'+
      (todayIsSameDay&&checkedCount>0?checkedCount+'/'+totalCount+' ejercicios completados hoy':totalCount+' ejercicios en este día')+
      '</div>'+
      '<div style="font-size:10px;color:'+(pctCheck===100?GREEN:'#52525b')+';font-weight:700">'+pctCheck+'%</div>'+
      '</div>';
    h+='<div style="height:3px;background:#18181b;border-radius:2px;overflow:hidden;margin-bottom:10px">'+
      '<div style="height:100%;width:'+pctCheck+'%;background:'+(pctCheck===100?GREEN:ORANGE)+';border-radius:2px;transition:width .3s"></div></div>';
    h+='<button data-a="closeDay" style="width:100%;background:'+(checkedCount>0?a+'22':'#18181b')+';color:'+(checkedCount>0?a:'#3f3f46')+';'+
      'border:1px solid '+(checkedCount>0?a+'44':'#27272a')+';border-radius:8px;padding:10px;font-size:13px">'+
      '✓ Cerrar día'+(checkedCount===0?' (sin checks)':'')+'</button>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

        '</div><span style="color:#3f3f46;font-size:14px">›</span></button>';

  return h||'<div style="font-size:13px;color:#3f3f46;padding:8px 0">Sin resultados</div>';

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────
function buildProgress(){
  var withData=S.exercises.filter(function(e){return S.weights[e.id]&&S.weights[e.id].hist&&S.weights[e.id].hist.length>=1;});
  withData.sort(function(a,b){return a.name.localeCompare(b.name);});
  var sel=S.progExId?S.exercises.find(function(e){return e.id===S.progExId;}):null;
  var hist=sel?(S.weights[sel.id]?S.weights[sel.id].hist:[]):[];
  var maxW=hist.length?Math.max.apply(null,hist.map(function(h){return h.w;})):0;
  var prog=hist.length>=2?((hist[hist.length-1].w-hist[0].w)/hist[0].w*100).toFixed(1):null;

  var now=Date.now();var wk=7*24*60*60*1000;
  var trailLines=[];
  S.routine.days.forEach(function(d){
    var dayLines=[];
    (d.exercises||[]).forEach(function(asgn){
      var def=S.exercises.find(function(e){return e.id===asgn.id;});
      var w=S.weights[asgn.id];
      if(!def||!w) return;
      var recent=(w.hist||[]).filter(function(h){return now-h.d<=wk;});
      if(recent.length) dayLines.push(def.name+' '+asgn.s+'×'+asgn.r+'@'+w.current+'kg');
    });
    if(dayLines.length) trailLines.push(d.label+': '+dayLines.join(' | '));
  });
  var desde=new Date(now-wk).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
  var hasta=new Date(now).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
  var trail=trailLines.length?'[GYM '+desde+'–'+hasta+']\n'+trailLines.join('\n'):null;

  var h='<div style="padding:10px 14px">';

  // Bloque trail
  h+='<div style="background:#0c1a2e;border-radius:12px;margin-bottom:14px;border:1px solid #1e3a5f;overflow:hidden">';
  h+='<div style="padding:10px 13px 8px;border-bottom:1px solid #1e3a5f">'+
    '<div style="font-size:11px;font-weight:700;color:'+SKY+';margin-bottom:8px">🏃 ENTRENADOR TRAIL</div>'+
    '<div class="hscroll" style="gap:6px">';
  [{id:'resumen',label:'Resumen semanal'},{id:'backup',label:'Backup JSON'}].forEach(function(t){
    var on=S.trailTab===t.id;
    h+='<button data-a="trailTab" data-v="'+t.id+'" style="flex-shrink:0;padding:4px 12px;font-size:11px;border-radius:8px;'+
      'background:'+(on?SKY:'#0a1929')+';color:'+(on?'#fff':'#52525b')+';border:1px solid '+(on?SKY:'#1e3a5f')+'">'+t.label+'</button>';
  });
  h+='</div></div>';

  if(S.trailTab==='resumen'){
    h+='<div style="padding:12px 13px">';
    if(trail){
      h+='<textarea id="trail-text" readonly rows="5" style="background:#0a0a14;border:1px solid #1e3a5f;color:#94a3b8;font-family:monospace;font-size:11px;line-height:1.6;margin-bottom:8px">'+esc(trail)+'</textarea>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
        '<button data-a="copyTrail" id="btn-copy-trail" style="background:'+SKY+';color:#fff;border-radius:8px;padding:7px 16px;font-size:12px">Copiar</button>'+
        '<span style="font-size:10px;color:#3f3f46">'+trailLines.length+' días esta semana</span>'+
        '</div>';
    } else {
      h+='<div style="font-size:12px;color:#3f3f46;line-height:1.6">No hay pesos de los últimos 7 días.<br>Registrá en <b style="color:#fafafa">Entrenar</b>.</div>';
    }
    h+='</div>';
  } else {
    h+='<div style="padding:12px 13px">'+
      '<div style="font-size:11px;color:#52525b;line-height:1.5;margin-bottom:8px"><b style="color:#94a3b8">Exportar:</b> guardá el JSON en Drive o mail para migrar de teléfono.</div>'+
      '<button data-a="copyBackup" id="btn-copy-bk" style="background:#1c1c21;color:'+SKY+';border:1px solid '+SKY+'44;border-radius:8px;padding:7px 14px;font-size:12px;margin-bottom:12px">Copiar JSON de backup</button>'+
      '<div style="font-size:11px;color:#52525b;margin-bottom:6px"><b style="color:#94a3b8">Restaurar:</b></div>'+
      '<textarea id="import-txt" rows="4" placeholder="Pegá el JSON de backup acá..." style="background:#0a0a14;border:1px solid #1e3a5f;color:#94a3b8;font-family:monospace;font-size:11px;margin-bottom:6px"></textarea>'+
      '<button data-a="doImport" style="background:#1e3a5f;color:'+SKY+';border-radius:8px;padding:7px 14px;font-size:12px">Restaurar backup</button>'+
      (S.importMsg?'<div style="font-size:11px;margin-top:6px;color:'+(S.importMsg.indexOf('✅')>=0?'#10b981':'#e24a4a')+'">'+S.importMsg+'</div>':'')+
      '</div>';
  }
  h+='</div>';

  // Selector de ejercicios
  h+='<div style="font-size:10px;color:#52525b;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Evolución por ejercicio</div>';
  h+='<div class="hscroll" style="margin-bottom:12px;gap:5px">';
  if(!withData.length) h+='<span style="font-size:12px;color:#3f3f46">Cargá pesos en Entrenar para ver la evolución.</span>';
  withData.forEach(function(e){
    var on=S.progExId===e.id;
    h+='<button data-a="progEx" data-v="'+e.id+'" style="flex-shrink:0;padding:4px 9px;font-size:10px;border-radius:8px;'+
      'background:'+(on?(MC[e.muscle]||SKY):'#18181b')+';color:'+(on?'#fff':'#71717a')+';'+
      'border:1px solid '+(on?(MC[e.muscle]||SKY)+'60':'#27272a')+'">'+esc(e.name)+'</button>';
  });
  h+='</div>';

  if(sel&&hist.length>=1){
    h+='<div class="card" style="margin:0 0 12px;padding:14px 13px">';
    h+='<div style="font-size:14px;font-weight:700;color:#fafafa;margin-bottom:3px">'+esc(sel.name)+'</div>';
    h+='<span class="pill" style="background:'+mc(sel.muscle)+'18;color:'+mc(sel.muscle)+';border:1px solid '+mc(sel.muscle)+'28;margin-bottom:12px;display:inline-block">'+sel.muscle+'</span>';
    h+='<div style="display:flex;gap:7px;margin-bottom:14px">';
    [{l:'Actual',v:S.weights[sel.id].current+' kg',c:'#fafafa'},
     {l:'Máximo',v:maxW+' kg',c:'#f97316'},
     {l:'Progreso',v:prog!=null?(prog>0?'+':'')+prog+'%':'—',c:prog>0?GREEN:prog<0?'#e24a4a':'#71717a'},
     {l:'Registros',v:hist.length,c:'#71717a'}
    ].forEach(function(s){
      h+='<div style="flex:1;background:#1c1c21;border-radius:8px;padding:7px 5px;text-align:center">'+
        '<div style="font-size:9px;color:#3f3f46;margin-bottom:2px">'+s.l+'</div>'+
        '<div style="font-size:12px;font-weight:700;color:'+s.c+'">'+s.v+'</div></div>';
    });
    h+='</div>';
    h+=(hist.length>=2?'<canvas id="gym-chart" height="150"></canvas>':
      '<div style="text-align:center;padding:16px 0;color:#3f3f46;font-size:12px">Necesitás al menos 2 registros para ver el gráfico.</div>');
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ─── MODALES ─────────────────────────────────────────────────────────────────

  var inner='';

function buildPicker(){
  var day=S.routine.days.find(function(d){return d.id===S.dayId;});
  var dayExIds=(day?day.exercises:[]).map(function(a){return a.id;});
  var avail=S.exercises.filter(function(e){
    return dayExIds.indexOf(e.id)<0&&
      (S.pickerFilter==='all'||e.muscle===S.pickerFilter)&&
      e.name.toLowerCase().indexOf(S.pickerSearch.toLowerCase())>=0;
  });
  var h='<div class="mbox">'+
    '<div class="mhead"><span style="font-size:15px;font-weight:700">Agregar ejercicio</span>'+
    '<button data-a="closeModal" style="background:#27272a;color:#71717a;padding:4px 10px;font-size:13px;border-radius:8px">✕</button></div>'+
    '<div style="padding:10px 14px 6px">'+
    '<input id="picker-search" type="search" placeholder="Buscar..." value="'+esc(S.pickerSearch)+'" style="margin-bottom:8px">'+
    '<div class="hscroll" style="margin-bottom:4px">';
  ['all'].concat(MUSCLES).forEach(function(m){
    var on=S.pickerFilter===m;
    h+='<button data-a="pickerFilter" data-v="'+m+'" style="flex-shrink:0;padding:4px 10px;font-size:10px;border-radius:20px;'+
      'background:'+(on?(MC[m]||SKY):'#18181b')+';color:'+(on?'#fff':'#52525b')+'">'+
      (m==='all'?'Todos':m)+'</button>';
  });
  h+='</div></div><div id="picker-list" style="padding:0 14px 24px">'+buildPickerList(avail)+'</div></div>';
  return h;
}

function buildPickerList(avail){
  if(!avail){
    var day=S.routine.days.find(function(d){return d.id===S.dayId;});
    var dayExIds=(day?day.exercises:[]).map(function(a){return a.id;});
    avail=S.exercises.filter(function(e){
      return dayExIds.indexOf(e.id)<0&&
        (S.pickerFilter==='all'||e.muscle===S.pickerFilter)&&
        e.name.toLowerCase().indexOf(S.pickerSearch.toLowerCase())>=0;
    });
  }
  if(!avail.length) return'<div style="color:#3f3f46;font-size:13px;padding:8px 0">Sin ejercicios disponibles</div>';
  return avail.map(function(ex){
    return'<button data-a="addEx" data-v="'+ex.id+'" style="display:flex;justify-content:space-between;align-items:center;width:100%;'+
      'padding:10px 0;border-bottom:1px solid #1c1c21;background:transparent;text-align:left;cursor:pointer">'+
      '<div><div style="font-size:13px;font-weight:600;color:#e4e4e7">'+esc(ex.name)+'</div>'+
      '<div style="font-size:10px;color:'+mc(ex.muscle)+';margin-top:2px;font-weight:600">'+ex.muscle+'</div></div>'+
      '<span style="color:'+SKY+';font-size:20px;font-weight:300;flex-shrink:0">+</span></button>';
  }).join('');
}

function buildNewEx(){
  return'<div class="mbox">'+
    '<div class="mhead"><span style="font-size:15px;font-weight:700">Nuevo ejercicio</span>'+
    '<button data-a="closeModal" style="background:#27272a;color:#71717a;padding:4px 10px;font-size:13px;border-radius:8px">✕</button></div>'+
    '<div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px">'+
    '<label class="flbl">Nombre del ejercicio</label>'+
    '<input id="new-name" type="text" placeholder="Ej: Curl con mancuerna">'+
    '<label class="flbl">Grupo muscular</label>'+
    '<select id="new-muscle">'+MUSCLES.map(function(m){return'<option value="'+m+'">'+m+'</option>';}).join('')+'</select>'+
    '<p style="font-size:11px;color:#52525b;margin:0">Las series y reps se configuran en cada día de la rutina.</p>'+
    '<button data-a="saveNewEx" style="background:'+SKY+';color:#fff;border-radius:10px;padding:12px;font-size:14px;margin-top:4px">Guardar ejercicio</button>'+
    '</div></div>';
}

function buildEditEx(){
  var ex=S.editExData;
  return'<div class="mbox">'+
    '<div class="mhead"><span style="font-size:15px;font-weight:700">Editar ejercicio</span>'+
    '<button data-a="closeModal" style="background:#27272a;color:#71717a;padding:4px 10px;font-size:13px;border-radius:8px">✕</button></div>'+
    '<div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px">'+
    '<label class="flbl">Nombre</label>'+
    '<input id="edit-name" type="text" value="'+esc(ex.name)+'">'+
    '<label class="flbl">Grupo muscular</label>'+
    '<select id="edit-muscle">'+MUSCLES.map(function(m){return'<option value="'+m+'"'+(ex.muscle===m?' selected':'')+'>'+m+'</option>';}).join('')+'</select>'+
    '<button data-a="saveEditEx" style="background:'+SKY+';color:#fff;border-radius:10px;padding:12px;font-size:14px">Guardar</button>'+
    (ex.custom?'<button data-a="deleteEx" data-v="'+ex.id+'" style="background:#27272a;color:#e24a4a;border-radius:10px;padding:12px;font-size:13px">Eliminar ejercicio</button>':'')+
    '</div></div>';
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function buildNav(){
  var tabs=[{id:'workout',icon:'🏋️',label:'Entrenar'},{id:'library',icon:'📋',label:'Ejercicios'},{id:'progress',icon:'📈',label:'Evolución'}];
  return'<div class="bnav">'+tabs.map(function(t){
    return'<button class="nb'+(S.view===t.id?' on':'')+'" data-a="view" data-v="'+t.id+'">'+
      '<span style="font-size:20px">'+t.icon+'</span>'+t.label+'</button>';
  }).join('')+'</div>';
}

// ─── CHART ────────────────────────────────────────────────────────────────────
function renderChart(){
  var canvas=document.getElementById('gym-chart');if(!canvas)return;
  var ex=S.exercises.find(function(e){return e.id===S.progExId;});
  var hist=S.weights[S.progExId]?S.weights[S.progExId].hist:[];
  if(chartInst){chartInst.destroy();chartInst=null;}
  var clr=MC[ex?ex.muscle:'']||SKY;
  chartInst=new Chart(canvas,{type:'line',
    data:{labels:hist.map(function(h){return fmtD(h.d);}),
      datasets:[{data:hist.map(function(h){return h.w;}),borderColor:clr,backgroundColor:clr+'20',
        borderWidth:2,pointBackgroundColor:clr,pointRadius:3,pointHoverRadius:5,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c21',borderColor:'#27272a',borderWidth:1,
        titleColor:'#71717a',bodyColor:'#fafafa',callbacks:{label:function(ctx){return ctx.parsed.y+' kg';}}}},
      scales:{x:{grid:{display:false},ticks:{color:'#3f3f46',font:{size:9}}},
        y:{grid:{color:'#1c1c21'},ticks:{color:'#3f3f46',font:{size:9}},border:{display:false}}},
      animation:{duration:300}}});
}

// ─── ACCIONES ────────────────────────────────────────────────────────────────
function doAction(a,v){
  switch(a){
    case 'view':
      S.view=v;S.dayEditMode=false;S.editingW=null;S.editingSD=null;S.modal=null;render();break;
    case 'day':
      S.dayId=parseInt(v);S.editingW=null;S.editingSD=null;S.histOpen=null;S.dayEditMode=false;render();break;
    case 'toggleEdit':
      S.dayEditMode=!S.dayEditMode;S.editingW=null;S.editingSD=null;render();break;

    // ── Peso ──
    case 'startEditW': S.editingW=v;S.editingSD=null;S.histOpen=null;render();break;
    case 'cancelEditW': S.editingW=null;render();break;
    case 'saveW':{
      var inp=document.getElementById('wi');
      var val=numP(inp?inp.value:'');
      if(isNaN(val)||val<=0){S.editingW=null;render();break;}
      var prev=S.weights[v]||{};
      S.weights[v]={current:val,hist:(prev.hist||[]).concat([{w:val,d:Date.now()}]).slice(-30)};
      saveW();S.editingW=null;render();break;}

    // ── Series/Reps ──
    case 'startEditSD': S.editingSD=v;S.editingW=null;render();break;
    case 'cancelSD': S.editingSD=null;render();break;
    case 'saveSD':{
      var sEl=document.getElementById('sd-s');var rEl=document.getElementById('sd-r');
      var sVal=parseInt(sEl?sEl.value:4)||4;
      var rVal=(rEl?rEl.value:'10').trim()||'10';
      var daySD=S.routine.days.find(function(d){return d.id===S.dayId;});
      var asgnSD=daySD?(daySD.exercises||[]).find(function(e){return e.id===v;}):null;
      if(asgnSD){asgnSD.s=sVal;asgnSD.r=rVal;saveR();}
      S.editingSD=null;render();break;}

    // ── Historial ──
    case 'toggleHist': S.histOpen=S.histOpen===v?null:v;render();break;

    // ── Check de ejercicio ──
    case 'toggleCheck':{
      var tk=todayKey();
      var tc=S.completions[tk]||{dayId:S.dayId,checks:[],closed:false,closedAt:null};
      // Si cambiamos de día, reseteamos checks
      if(tc.dayId!==S.dayId){tc={dayId:S.dayId,checks:[],closed:false,closedAt:null};}
      var idx=tc.checks.indexOf(v);
      if(idx>=0) tc.checks.splice(idx,1); else tc.checks.push(v);
      S.completions[tk]=tc;
      saveCp();render();break;}

    // ── Cierre de día ──
    case 'closeDay':{
      var tkC=todayKey();
      var tcC=S.completions[tkC]||{dayId:S.dayId,checks:[],closed:false,closedAt:null};
      if(tcC.dayId!==S.dayId) tcC={dayId:S.dayId,checks:[],closed:false,closedAt:null};
      tcC.closed=true;tcC.closedAt=Date.now();
      S.completions[tkC]=tcC;saveCp();render();break;}
    case 'reopenDay':{
      var tkR=todayKey();
      if(S.completions[tkR]) S.completions[tkR].closed=false;
      saveCp();render();break;}

    // ── Picker ──
    case 'openPicker': S.modal='picker';S.pickerSearch='';S.pickerFilter='all';render();break;
    case 'pickerFilter':
      S.pickerFilter=v;
      var pl=document.getElementById('picker-list');if(pl) pl.innerHTML=buildPickerList();
      document.querySelectorAll('[data-a=pickerFilter]').forEach(function(btn){
        var on=btn.dataset.v===v;
        btn.style.background=on?(MC[v]||SKY):'#18181b';btn.style.color=on?'#fff':'#52525b';
      });break;

    // ── Agregar/quitar ejercicio del día ──
    case 'addEx':{
      var dayAdd=S.routine.days.find(function(d){return d.id===S.dayId;});
      if(dayAdd){dayAdd.exercises.push({id:v,s:4,r:'10'});saveR();}
      S.modal=null;render();break;}
    case 'removeEx':{
      var dayRem=S.routine.days.find(function(d){return d.id===S.dayId;});
      if(dayRem){dayRem.exercises=dayRem.exercises.filter(function(e){return e.id!==v;});saveR();}
      render();break;}

    // ── Biblioteca ──
    case 'libFilter':
      S.libFilter=v;
      var ll=document.getElementById('lib-list');if(ll) ll.innerHTML=buildLibList();
      document.querySelectorAll('[data-a=libFilter]').forEach(function(btn){
        var on=btn.dataset.v===v;
        btn.style.background=on?(MC[v]||SKY):'#18181b';btn.style.color=on?'#fff':'#52525b';
      });break;

    // ── Nuevo ejercicio ──
    case 'openNewEx':
      S.modal='newEx';render();
      setTimeout(function(){var el=document.getElementById('new-name');if(el)el.focus();},50);break;
    case 'saveNewEx':{
      var nameEl=document.getElementById('new-name');
      var nameVal=nameEl?nameEl.value.trim():'';
      if(!nameVal){if(nameEl){nameEl.style.borderColor='#e24a4a';}break;}
      var muscleEl=document.getElementById('new-muscle');
      var muscleVal=muscleEl?muscleEl.value:'Piernas';
      S.exercises.push({id:uid(),name:nameVal,muscle:muscleVal,custom:true});
      saveCx();S.modal=null;render();break;}

    // ── Editar ejercicio ──
    case 'openEditEx':{
      var exEd=S.exercises.find(function(e){return e.id===v;});
      if(!exEd)break;S.editExData=Object.assign({},exEd);S.modal='editEx';render();break;}
    case 'saveEditEx':{
      var nEl=document.getElementById('edit-name');var mEl=document.getElementById('edit-muscle');
      var nVal=nEl?nEl.value.trim():'';var mVal=mEl?mEl.value:(S.editExData?S.editExData.muscle:'');
      if(!nVal||!S.editExData)break;
      S.exercises=S.exercises.map(function(e){
        return e.id===S.editExData.id?Object.assign({},S.editExData,{name:nVal,muscle:mVal}):e;
      });
      saveCx();S.modal=null;S.editExData=null;render();break;}
    case 'deleteEx':{
      if(!confirm('¿Eliminar "'+( S.editExData?S.editExData.name:'')+'"?'))break;
      S.exercises=S.exercises.filter(function(e){return e.id!==v;});
      S.routine.days.forEach(function(d){d.exercises=d.exercises.filter(function(e){return e.id!==v;});});
      saveCx();saveR();S.modal=null;S.editExData=null;render();break;}

    // ── Fecha de inicio ──
    case 'openStartDate': S.modal='startDate';render();
      setTimeout(function(){var el=document.getElementById('start-date-input');if(el)el.focus();},50);break;
    case 'saveStartDate':{
      var sdEl=document.getElementById('start-date-input');
      if(sdEl&&sdEl.value){
        // Parsear como fecha local (no UTC)
        var parts=sdEl.value.split('-');
        var localDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
        S.routine.startDate=localDate.getTime();
        saveR();
      }
      S.modal=null;render();break;}
    case 'clearStartDate':
      S.routine.startDate=null;saveR();S.modal=null;render();break;

    // ── Modal ──
    case 'closeModal': S.modal=null;S.editExData=null;render();break;

    // ── Progreso ──
    case 'trailTab': S.trailTab=v;render();break;
    case 'progEx': S.progExId=S.progExId===v?null:v;render();break;
    case 'copyTrail':{
      var tEl=document.getElementById('trail-text');if(!tEl)break;
      navigator.clipboard&&navigator.clipboard.writeText(tEl.value).catch(function(){});
      var btn=document.getElementById('btn-copy-trail');
      if(btn){btn.textContent='¡Copiado!';btn.style.background=GREEN;
        setTimeout(function(){btn.textContent='Copiar';btn.style.background=SKY;},2000);}break;}
    case 'copyBackup':{
      var bk=JSON.stringify({weights:S.weights,routine:S.routine,
        custom:S.exercises.filter(function(e){return e.custom;}),
        completions:S.completions,at:Date.now()},null,2);
      navigator.clipboard&&navigator.clipboard.writeText(bk).catch(function(){});
      var bkBtn=document.getElementById('btn-copy-bk');
      if(bkBtn){bkBtn.textContent='¡Copiado!';bkBtn.style.color=GREEN;
        setTimeout(function(){bkBtn.textContent='Copiar JSON de backup';bkBtn.style.color=SKY;},2000);}break;}
    case 'doImport':{
      try{
        var impEl=document.getElementById('import-txt');
        var data=JSON.parse(impEl?impEl.value:'');
        if(!data.weights||!data.routine)throw new Error();
        S.weights=data.weights;S.routine=data.routine;
        S.routine.days.forEach(function(d){
          if(d.exerciseIds&&!d.exercises){d.exercises=d.exerciseIds.map(function(id){return{id:id,s:4,r:'10'};});delete d.exerciseIds;}
        });
        if(!S.routine.hasOwnProperty('startDate')) S.routine.startDate=null;
        if(data.completions) S.completions=data.completions;
        if(data.custom&&data.custom.length) S.exercises=PRESETS.concat(data.custom);
        saveW();saveR();saveCp();saveCx();
        S.importMsg='✅ Datos restaurados correctamente.';
      }catch(e){S.importMsg='❌ JSON inválido.';}
      render();break;}
  }
}

// ─── BIND ─────────────────────────────────────────────────────────────────────
function bind(){
  var app=document.getElementById('app');
  app.onclick=function(e){
    if(e.target.classList.contains('overlay')){doAction('closeModal');return;}
    var btn=e.target.closest('[data-a]');
    if(btn) doAction(btn.dataset.a,btn.dataset.v);
  };
  var libSearch=document.getElementById('lib-search');
  if(libSearch) libSearch.oninput=function(e){
    S.libSearch=e.target.value;
    var ll=document.getElementById('lib-list');if(ll) ll.innerHTML=buildLibList();
  };
  var pickerSearch=document.getElementById('picker-search');
  if(pickerSearch) pickerSearch.oninput=function(e){
    S.pickerSearch=e.target.value;
    var pl=document.getElementById('picker-list');if(pl) pl.innerHTML=buildPickerList();
  };
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
